<div class="viz" id="viz07">
  <h4>Interactive · temperature & softmax</h4>
  <p style="font-size:13px;color:#c9d1d9;margin:4px 0 10px">
    Same logits, different <b>temperature</b> <code>T</code>. softmax(x/T): low T → sharp/greedy,
    high T → flat/random. Drag the slider and watch the probabilities.
  </p>
  <div class="row">
    <label>Temperature</label>
    <input id="v07-t" type="range" min="0.1" max="3" step="0.05" value="1" style="width:220px" />
    <span class="val" id="v07-tv">1.00</span>
  </div>
  <div id="v07-bars" style="display:flex;align-items:flex-end;gap:10px;height:130px;margin-top:8px"></div>
</div>
<script>
(function () {
  var logits = [3.0, 2.0, 1.0, 0.5, -1.0];
  var labels = ["tok A", "tok B", "tok C", "tok D", "tok E"];
  var slider = document.getElementById("v07-t");
  var tv = document.getElementById("v07-tv");
  var box = document.getElementById("v07-bars");
  function softmax(xs, T) {
    var z = xs.map(function (x) { return x / T; });
    var m = Math.max.apply(null, z);
    var e = z.map(function (v) { return Math.exp(v - m); });
    var s = e.reduce(function (a, b) { return a + b; }, 0);
    return e.map(function (v) { return v / s; });
  }
  function render() {
    var T = parseFloat(slider.value);
    tv.textContent = T.toFixed(2);
    var p = softmax(logits, T);
    box.innerHTML = "";
    p.forEach(function (prob, i) {
      var col = document.createElement("div");
      col.style.cssText = "flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%";
      var bar = document.createElement("div");
      bar.style.cssText = "width:100%;border-radius:5px 5px 0 0;background:linear-gradient(#4f8cff,#2563eb);transition:height .12s";
      bar.style.height = (6 + prob * 100) + "px";
      var pct = document.createElement("div");
      pct.style.cssText = "font:12px ui-monospace,monospace;color:#ffd9a0;margin-top:4px";
      pct.textContent = (prob * 100).toFixed(1) + "%";
      var lab = document.createElement("div");
      lab.style.cssText = "font-size:11px;color:#8b949e";
      lab.textContent = labels[i];
      col.appendChild(bar); col.appendChild(pct); col.appendChild(lab);
      box.appendChild(col);
    });
  }
  slider.addEventListener("input", render);
  render();
})();
</script>
