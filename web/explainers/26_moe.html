<div class="viz" id="viz26">
  <h4>Interactive · top-k expert routing</h4>
  <p style="font-size:13px;color:#c9d1d9;margin:4px 0 10px">
    A router scores each token over <code>E=4</code> experts. Each token activates only its
    <b style="color:#4f8cff">top-k</b> experts; their scores are softmax-normalized into mixing weights.
    The other <code>E−k</code> experts never run — <b>sparse activation</b>.
  </p>
  <div class="row">
    <label>top_k</label>
    <input id="v26-k" type="range" min="1" max="4" step="1" value="2" style="width:200px" />
    <span class="val" id="v26-kv">2</span>
    <button id="v26-reroll" class="btn" style="padding:3px 9px">↻ new scores</button>
  </div>
  <div id="v26-rows" style="margin-top:8px"></div>
  <p id="v26-cap" style="font-size:12px;color:#8b949e;margin:8px 0 0"></p>
</div>
<script>
(function () {
  var rowsEl = document.getElementById("v26-rows");
  if (!rowsEl) return;
  var E = 4, N = 3;
  var names = ["tok 0", "tok 1", "tok 2"];
  var exColors = ["#4f8cff", "#2ea043", "#d29922", "#f85149"];
  var kEl = document.getElementById("v26-k"), kv = document.getElementById("v26-kv");
  var cap = document.getElementById("v26-cap");
  var scores;
  function randn() { return (Math.random() + Math.random() + Math.random() + Math.random() - 2) / 1.2; }
  function reroll() {
    scores = [];
    for (var i = 0; i < N; i++) { var r = []; for (var e = 0; e < E; e++) r.push(randn() * 1.6); scores.push(r); }
  }
  function topkIdx(arr, k) {
    return arr.map(function (v, i) { return [v, i]; })
      .sort(function (a, b) { return b[0] - a[0]; })
      .slice(0, k).map(function (p) { return p[1]; });
  }
  function softmaxSel(arr, idx) {
    var vals = idx.map(function (i) { return arr[i]; });
    var mx = Math.max.apply(null, vals);
    var ex = vals.map(function (v) { return Math.exp(v - mx); });
    var sm = ex.reduce(function (a, b) { return a + b; }, 0);
    var w = {}; idx.forEach(function (i, j) { w[i] = ex[j] / sm; });
    return w;
  }
  function render() {
    var k = parseInt(kEl.value, 10);
    kv.textContent = k;
    var html = '<table style="border-collapse:collapse;width:100%;max-width:430px;font:12px ui-monospace,monospace">';
    var activeTotal = 0;
    for (var i = 0; i < N; i++) {
      var chosen = topkIdx(scores[i], k);
      var chosenSet = {}; chosen.forEach(function (c) { chosenSet[c] = true; });
      var w = softmaxSel(scores[i], chosen);
      activeTotal += k;
      html += '<tr><td style="color:#8b949e;padding:6px 8px 6px 0;white-space:nowrap;vertical-align:middle">' + names[i] + '</td><td style="padding:4px 0">';
      html += '<div style="display:flex;gap:6px">';
      for (var e = 0; e < E; e++) {
        var on = chosenSet[e];
        var sc = scores[i][e];
        var h = 10 + Math.max(0, (sc + 3)) * 9; // visual height from score
        var col = on ? exColors[e] : "#2b3340";
        var weightTxt = on ? (w[e] * 100).toFixed(0) + "%" : "·";
        html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center">';
        html += '<div style="font-size:10px;color:' + (on ? "#e6edf3" : "#8b949e") + '">' + weightTxt + '</div>';
        html += '<div style="width:100%;height:46px;display:flex;align-items:flex-end">';
        html += '<div style="width:100%;height:' + Math.min(h, 46).toFixed(0) + 'px;border-radius:4px 4px 0 0;background:' + col +
          ';opacity:' + (on ? "1" : "0.4") + ';box-shadow:' + (on ? "0 0 0 1px " + col : "none") + '"></div>';
        html += '</div>';
        html += '<div style="font-size:9px;color:' + (on ? exColors[e] : "#8b949e") + ';margin-top:2px">E' + e + (on ? " ✓" : "") + '</div>';
        html += '</div>';
      }
      html += '</div></td></tr>';
    }
    html += '</table>';
    rowsEl.innerHTML = html;
    var totalRuns = N * E;
    cap.innerHTML = 'Active expert-runs: <b style="color:#2ea043">' + activeTotal + '</b> of <b>' + totalRuns +
      '</b> possible. Params grow with E, but per-token compute is fixed at k. Weights within each token sum to 100%.';
  }
  kEl.addEventListener("input", render);
  document.getElementById("v26-reroll").addEventListener("click", function () { reroll(); render(); });
  reroll(); render();
})();
</script>
