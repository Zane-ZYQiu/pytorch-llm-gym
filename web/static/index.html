<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PyTorch LLM Gym</title>
  <link rel="stylesheet" href="/static/style.css" />
  <!-- marked first, so it attaches window.marked before Monaco's AMD loader defines `define` -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <!-- Monaco Editor — the engine behind VS Code (and LeetCode). Loaded from CDN, no build step. -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs" } });
    // Monaco's web workers, bootstrapped from the CDN (keeps the zero-build setup working).
    window.MonacoEnvironment = {
      getWorkerUrl: function () {
        return "data:text/javascript;charset=utf-8," + encodeURIComponent(
          "self.MonacoEnvironment={baseUrl:'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/'};" +
          "importScripts('https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/base/worker/workerMain.js');"
        );
      }
    };
    require(["vs/editor/editor.main"], function () {
      window.__MONACO_READY = true;
      document.dispatchEvent(new Event("monaco-ready"));
    });
  </script>
</head>
<body>
  <header>
    <div class="brand">🏋️ PyTorch LLM <span>Gym</span></div>
    <div class="tagline">Implement LLM internals from scratch — LeetCode-style, runs locally</div>
    <div class="header-actions">
      <button id="prev" class="btn ghost" title="Previous problem">◀</button>
      <button id="next-prob" class="btn ghost" title="Next problem">▶</button>
      <button id="theme" class="btn ghost" title="Toggle light/dark">🌙</button>
    </div>
    <div id="progress" class="progress"></div>
  </header>

  <div id="layout">
    <aside id="sidebar"><div class="side-title">Problems</div><div id="problist"></div></aside>

    <div id="splitter-left" title="Drag to resize"></div>

    <section id="desc">
      <div id="desc-head">
        <span id="desc-level" class="badge"></span>
        <h2 id="desc-title">Pick a problem on the left →</h2>
      </div>
      <div id="explainer"></div>
      <div id="desc-body" class="markdown"></div>
    </section>

    <div id="splitter" title="Drag to resize"></div>

    <section id="work">
      <div id="editor-wrap"><div id="code"></div></div>
      <div id="toolbar">
        <button id="run" class="btn primary">▶ Run tests</button>
        <button id="reset" class="btn">↺ Reset</button>
        <button id="hint" class="btn">💡 Hint</button>
        <button id="solution" class="btn">👁 Solution</button>
        <span id="status" class="status"></span>
      </div>
      <div id="splitter-h" title="Drag to resize console"></div>
      <pre id="console">Implement the TODOs in the editor, then click “Run tests”.</pre>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
